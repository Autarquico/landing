<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#10B981" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Per-route SEO metadata is rendered via react-helmet-async at build time -->

    <!-- LocalBusiness structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "Autarquico Labs S.L.U.",
      "description": "Consultora de IA en Tenerife. Implementamos agentes autónomos, automatización de workflows, integraciones ERP/CRM y BI conversacional.",
      "url": "https://autarqui.co",
      "email": "info@autarqui.co",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Santa Úrsula",
        "addressRegion": "Tenerife",
        "addressCountry": "ES"
      },
      "areaServed": [
        { "@type": "Place", "name": "Tenerife" },
        { "@type": "Place", "name": "Islas Canarias" },
        { "@type": "Place", "name": "España" }
      ],
      "priceRange": "$$",
      "sameAs": ["https://instagram.com/autarqui.co"]
    }
    </script>

    <!-- Fonts: Fraunces (display) + Inter (body) - non-blocking -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Inter:wght@400;500;600;700&display=swap" />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" /></noscript>
  </head>
  <body>
    <div id="root"></div>
    <!-- SPA redirect: restore path from 404.html query param -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      }(window.location))
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
